version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: benefits_navigator
      POSTGRES_USER: bn_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdevpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bn_user -d benefits_navigator']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bn_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: bn_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://bn_user:${DB_PASSWORD:-localdevpassword}@postgres:5432/benefits_navigator
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3001
    env_file: .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/src

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: bn_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file: .env.local
    depends_on:
      - api
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public

volumes:
  pgdata:
