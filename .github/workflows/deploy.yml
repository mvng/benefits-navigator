name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API → AWS ECS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/bn-api:$IMAGE_TAG ./apps/api
          docker push $ECR_REGISTRY/bn-api:$IMAGE_TAG
          docker tag $ECR_REGISTRY/bn-api:$IMAGE_TAG $ECR_REGISTRY/bn-api:latest
          docker push $ECR_REGISTRY/bn-api:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster bn-production \
            --service bn-api \
            --force-new-deployment \
            --region us-west-2

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster bn-production \
            --services bn-api \
            --region us-west-2

  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        run: |
          cd apps/web
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
